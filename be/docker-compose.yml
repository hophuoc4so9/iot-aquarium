version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: aquarium-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: aquarium_db
      MYSQL_USER: aquarium
      MYSQL_PASSWORD: aquarium123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
