# Test configuration - use H2 in-memory database for tests
spring.application.name=backend_iot_aquarium-test

# H2 in-memory database for testing
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# MQTT - use mock/disabled for tests
mqtt.broker=tcp://localhost:1883
mqtt.clientId=backend-iot-aquarium-test
mqtt.topic=esp32/telemetry

# Thresholds for alerts
alerts.temperature.high=30.0
alerts.temperature.low=18.0
alerts.ph.high=8.5
alerts.ph.low=6.0

# AI Service (required by AiGatewayService; use stub URL for tests)
ai.service.base-url=http://localhost:8000
