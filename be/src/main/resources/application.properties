spring.application.name=backend_iot_aquarium

# === Datasource (MySQL) ===
## MySQL running in Docker on localhost (docker-compose, host port 3307)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3307/aquarium_db?createDatabaseIfNotExist=true
spring.datasource.username=aquarium
spring.datasource.password=aquarium123

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# === MQTT (Eclipse Paho) ===
## MQTT broker - using public broker.emqx.io
mqtt.broker=${MQTT_BROKER:tcp://broker.emqx.io:1883}
mqtt.clientId=backend-iot-aquarium
## Topic private theo project để tránh nhiễu từ broker public.
mqtt.topic=nckh/iot-aquarium/esp32/telemetry
mqtt.pond-topic-prefix=nckh/iot-aquarium/esp32/pond/

# Thresholds for alerts
alerts.temperature.high=30.0
alerts.temperature.low=18.0
alerts.ph.high=8.5
alerts.ph.low=6.0

# === AI Service (Python) ===
ai.service.base-url=${AI_SERVICE_BASE_URL:http://localhost:8000}

# === Federated Learning (Backend orchestration) ===
fl.round.default-deadline-seconds=${FL_ROUND_DEFAULT_DEADLINE_SECONDS:900}
fl.round.default-min-clients=${FL_ROUND_DEFAULT_MIN_CLIENTS:1}
fl.round.default-min-samples=${FL_ROUND_DEFAULT_MIN_SAMPLES:1}
fl.scheduler.check-delay-ms=${FL_SCHEDULER_CHECK_DELAY_MS:30000}
fl.scheduler.auto-start-enabled=${FL_SCHEDULER_AUTO_START_ENABLED:false}
fl.scheduler.auto-start-interval-ms=${FL_SCHEDULER_AUTO_START_INTERVAL_MS:1800000}
fl.scheduler.auto-start-initial-delay-ms=${FL_SCHEDULER_AUTO_START_INITIAL_DELAY_MS:20000}
fl.scheduler.auto-start-device-ids=${FL_SCHEDULER_AUTO_START_DEVICE_IDS:}
fl.scheduler.auto-start-epochs=${FL_SCHEDULER_AUTO_START_EPOCHS:1}
fl.scheduler.auto-start-samples=${FL_SCHEDULER_AUTO_START_SAMPLES:32}

# === Gemini (Chatbot tư vấn - free tier) ===
# Lấy API key miễn phí: https://aistudio.google.com/app/apikey
# Có thể set biến môi trường GEMINI_API_KEY thay vì ghi key vào file (không commit key lên git)
gemini.api.key=AIzaSyBEJm7eKfptbeQHsqwJRFe9C-oAC5ieg5o
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}

# === Fish CSV paths ===
fish.csv.species-base=classpath:data/vn_fish_species_info.csv
fish.csv.species-info=classpath:data/vn_fish_species_info_vi.csv
fish.csv.ecology-base=classpath:data/vn_fish_ecology.csv
fish.csv.ecology-vi=classpath:data/vn_fish_ecology_vi.csv
fish.csv.species-list=classpath:data/vn_fish_species_list.csv
fish.csv.aquarium=classpath:data/freshwater_aquarium_fish_species.csv

# === Bootstrap users (for fresh DB) ===
app.bootstrap.users.enabled=true
app.bootstrap.admin.username=admin
app.bootstrap.admin.password=123456
