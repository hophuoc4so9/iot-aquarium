version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: mysql-aquarium
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: aquarium_db
      MYSQL_USER: aquarium
      MYSQL_PASSWORD: aquarium123
    ports:
      - "3307:3306"
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql

  adminer:
    image: adminer
    container_name: adminer-aquarium
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      - mysql

volumes:
  mysql_data: